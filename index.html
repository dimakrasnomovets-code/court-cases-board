        /* Resizable columns */

<script>
// ========================
// CONFIG
// ========================
const CONFIG_KEY = 'supabase_config';
function getConfig() {
    try { const raw = sessionStorage.getItem(CONFIG_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
    const params = new URLSearchParams(window.location.search);
    const url = params.get('sb_url'); const key = params.get('sb_key');
    if (url && key) return { url, key };
    if (window.__SUPABASE_URL__ && window.__SUPABASE_KEY__) return { url: window.__SUPABASE_URL__, key: window.__SUPABASE_KEY__ };
    return null;
}
function showConfig() {
    const cfg = getConfig();
    if (cfg) { document.getElementById('cfg-url').value = cfg.url; document.getElementById('cfg-key').value = cfg.key; }
    document.getElementById('config-modal').classList.remove('hidden');
}
function closeConfig() { document.getElementById('config-modal').classList.add('hidden'); }
function saveConfig() {
    const url = document.getElementById('cfg-url').value.trim();
    const key = document.getElementById('cfg-key').value.trim();
    if (!url || !key) return alert('Please fill in both fields');
    try { sessionStorage.setItem(CONFIG_KEY, JSON.stringify({ url, key })); } catch(e) {}
    closeConfig(); initSupabase(); loadData();
}

// ========================
// SUPABASE CLIENT
// ========================
let sbClient = null;
let allCases = [];
let allProperties = {};
let allLoans = {};
let allParties = {};
let allDocuments = {};

function initSupabase() {
    const cfg = getConfig();
    if (!cfg) return false;
    sbClient = window.supabase.createClient(cfg.url, cfg.key);
    return true;
}

// ========================
// HELPERS
// ========================
function formatNum(n) {
    if (!n && n !== 0) return '—';
    return Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function infoCard(label, value, colorClass) {
    return '<div class="glass-light rounded-xl p-3"><div class="text-xs text-dark-400 mb-1">' + label + '</div><div class="' + (colorClass || 'text-white') + ' font-medium">' + value + '</div></div>';
}
function loanField(label, value, colorClass) {
    return '<div><div class="text-xs text-dark-400">' + label + '</div><div class="' + (colorClass || 'text-white') + ' font-medium">' + value + '</div></div>';
}

// ========================
// CASE ANALYSIS HELPERS
// ========================
function getCaseParties(caseId) {
    const cid = String(caseId);
    const parties = allParties[cid] || [];
    const defendants = parties.filter(p => p.role && p.role.toLowerCase() === 'defendant');
    const plaintiffs = parties.filter(p => p.role && p.role.toLowerCase() === 'plaintiff');
    const pAttorneys = parties.filter(p => p.role && p.role.toLowerCase() === 'plaintiff_attorney');
    const dAttorneys = parties.filter(p => p.role && p.role.toLowerCase() === 'defendant_attorney');
    return { defendants, plaintiffs, pAttorneys, dAttorneys, all: parties };
}

function getDefendantInfo(caseId) {
    const { defendants, dAttorneys } = getCaseParties(caseId);
    const hasAttorney = dAttorneys.length > 0;
    const mainDefendants = defendants.filter(d => d.owner_type === 'owner' || d.owner_type === 'heir');
    const hasHeir = defendants.some(d => d.owner_type === 'heir');
    const hasEstate = defendants.some(d => d.owner_type === 'estate');
    const ownerTypes = [...new Set(defendants.map(d => d.owner_type).filter(Boolean))];
    const serviceInfo = defendants.find(d => d.service_address || d.service_date);
    return { defendants, dAttorneys, hasAttorney, mainDefendants, hasHeir, hasEstate, ownerTypes, serviceInfo };
}

function getCasePriority(c) {
    const cid = String(c.id);
    const defInfo = getDefendantInfo(c.id);
    const loan = allLoans[cid];
    const note = (c.note || '').toLowerCase();

    // Final Judgment = special priority
    if (note.includes('final judgment') || note.includes('summary judgment granted')) {
        return { level: 'judgment', label: 'Judgment', score: 0 };
    }
    // Heir + silent defendant = HIGH priority
    if (defInfo.hasHeir && !defInfo.hasAttorney) {
        return { level: 'high', label: 'High', score: 1 };
    }
    // Estate + silent = HIGH
    if (defInfo.hasEstate && !defInfo.hasAttorney) {
        return { level: 'high', label: 'High', score: 1 };
    }
    // Owner + silent = MEDIUM
    if (!defInfo.hasAttorney && defInfo.defendants.length > 0) {
        return { level: 'medium', label: 'Medium', score: 2 };
    }
    // Has attorney = LOW
    if (defInfo.hasAttorney) {
        return { level: 'low', label: 'Defended', score: 3 };
    }
    return { level: 'medium', label: 'Unknown', score: 4 };
}

function getDefendantStatusLabel(caseId) {
    const defInfo = getDefendantInfo(caseId);
    if (defInfo.hasAttorney) {
        return { text: 'Defended', class: 'text-dark-400 bg-dark-700/50' };
    }
    if (defInfo.defendants.length > 0) {
        return { text: 'Silent', class: 'text-amber-400 bg-amber-500/10' };
    }
    return { text: '—', class: 'text-dark-500' };
}

function getOwnerTypeLabel(ownerType) {
    const labels = {
        'owner': { text: 'Owner', class: 'text-blue-400 bg-blue-500/10' },
        'heir': { text: 'Heir', class: 'text-green-400 bg-green-500/10' },
        'estate': { text: 'Estate', class: 'text-purple-400 bg-purple-500/10' },
        'unknown': { text: 'Unknown', class: 'text-dark-400 bg-dark-700/50' },
    };
    return labels[ownerType] || labels['unknown'];
}

// Parse timeline events from case notes and documents
function getTimelineEvents(c) {
    const cid = String(c.id);
    const events = [];
    const docs = allDocuments[cid] || [];

    // Add documents as timeline events
    docs.forEach(doc => {
        if (doc.doc_date) {
            events.push({
                date: doc.doc_date,
                title: doc.description || 'Document #' + doc.doc_num,
                type: 'document',
                detail: doc.document_id ? 'Doc ID: ' + doc.document_id : null
            });
        }
    });

    // Parse key events from notes
    const note = c.note || '';

    // Try to extract dates and events from notes using common patterns
    const datePatterns = [
        { regex: /(?:filed|filing)\s+(\d{1,2}\/\d{1,2}\/\d{4})/gi, type: 'filing' },
        { regex: /(?:hearing|trial)\s+(?:on|set for|scheduled)\s+(\d{1,2}\/\d{1,2}\/\d{4})/gi, type: 'hearing' },
        { regex: /(?:default)\s+(?:entered|filed|granted)\s+(?:on\s+)?(\d{1,2}\/\d{1,2}\/\d{4})/gi, type: 'default' },
        { regex: /(?:motion|summary judgment)\s+(?:filed|granted)\s+(\d{1,2}\/\d{1,2}\/\d{4})/gi, type: 'motion' },
        { regex: /(?:sale|auction)\s+(?:on|set for|scheduled|date)\s+(\d{1,2}\/\d{1,2}\/\d{4})/gi, type: 'sale' },
        { regex: /(?:notice of hearing)\s+(\d{1,2}\/\d{1,2}\/\d{4})/gi, type: 'hearing' },
    ];

    datePatterns.forEach(({ regex, type }) => {
        let match;
        while ((match = regex.exec(note)) !== null) {
            events.push({
                date: match[1],
                title: match[0].trim(),
                type: type,
                detail: null
            });
        }
    });

    // If we have a filed_date, add it
    if (c.filed_date) {
        events.push({ date: c.filed_date, title: 'Case Filed', type: 'filing', detail: null });
    }

    // Add service info from defendants
    const defInfo = getDefendantInfo(c.id);
    if (defInfo.serviceInfo && defInfo.serviceInfo.service_date) {
        events.push({
            date: defInfo.serviceInfo.service_date,
            title: 'Service of Process',
            type: 'service',
            detail: defInfo.serviceInfo.service_method ? 'Method: ' + defInfo.serviceInfo.service_method : null
        });
    }

    // If note mentions key events without exact dates, add them as undated
    const keyPhrases = [
        { pattern: /default/i, label: 'Default Noted' },
        { pattern: /final judgment/i, label: 'Final Judgment' },
        { pattern: /summary judgment/i, label: 'Summary Judgment Motion' },
        { pattern: /notice of hearing/i, label: 'Notice of Hearing' },
        { pattern: /lis pendens/i, label: 'Lis Pendens Filed' },
    ];

    // Only add if no dated events of that type already exist
    keyPhrases.forEach(({ pattern, label }) => {
        if (pattern.test(note) && !events.some(e => e.title.toLowerCase().includes(label.toLowerCase()))) {
            events.push({ date: null, title: label + ' (from notes)', type: 'note', detail: null });
        }
    });

    // Sort by date, undated last
    events.sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return a.date.localeCompare(b.date);
    });

    return events;
}

// ========================
// LOAD DATA
// ========================
async function loadData() {
    if (!sbClient) {
        if (!initSupabase()) { showConfig(); return; }
    }
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('error').classList.add('hidden');
    document.getElementById('empty').classList.add('hidden');
    document.getElementById('table-container').classList.add('hidden');

    try {
        const [casesRes, propsRes, loansRes, partiesRes, docsRes] = await Promise.all([
            sbClient.from('cases').select('*').order('seq_num'),
            sbClient.from('properties').select('*'),
            sbClient.from('loans').select('*'),
            sbClient.from('parties').select('*'),
            sbClient.from('documents').select('*'),
        ]);
        if (casesRes.error) throw casesRes.error;

        allCases = casesRes.data || [];
        allProperties = {};
        (propsRes.data || []).forEach(p => { allProperties[p.case_id] = p; });
        allLoans = {};
        (loansRes.data || []).forEach(l => { allLoans[l.case_id] = l; });
        allParties = {};
        (partiesRes.data || []).forEach(p => {
            if (!allParties[p.case_id]) allParties[p.case_id] = [];
            allParties[p.case_id].push(p);
        });
        allDocuments = {};
        (docsRes.data || []).forEach(d => {
            if (!allDocuments[d.case_id]) allDocuments[d.case_id] = [];
            allDocuments[d.case_id].push(d);
        });

        updateStats();

        // Populate county filter
        const counties = [...new Set(allCases.map(c => c.county).filter(Boolean))].sort();
        const countySelect = document.getElementById('filter-county');
        const curCo = countySelect.value;
        countySelect.innerHTML = '<option value="">All Counties</option>' + counties.map(co => '<option value="' + co + '"' + (co === curCo ? ' selected' : '') + '>' + co + ' County</option>').join('');

        applyFilters();
    } catch (err) {
        console.error('Load error:', err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error-msg').textContent = err.message || 'Failed to connect';
    }
}

// ========================
// STATS
// ========================
function updateStats() {
    const foreclosures = allCases.filter(c => c.is_foreclosure === 1).length;
    const trackedCount = allCases.filter(c => c.tracked).length;
    const totalBalance = Object.values(allLoans).reduce((sum, l) => sum + (l.principal_balance || 0), 0);
    const totalArrears = Object.values(allLoans).reduce((sum, l) => sum + (l.estimated_arrears || 0), 0);
    const highPriority = allCases.filter(c => getCasePriority(c).level === 'high').length;

    document.getElementById('stats-bar').innerHTML = '\
        <div class="text-center"><div class="text-lg font-semibold text-white">' + allCases.length + '</div><div class="text-xs text-dark-400">Cases</div></div>\
        <div class="text-center"><div class="text-lg font-semibold text-emerald-400">' + foreclosures + '</div><div class="text-xs text-dark-400">Foreclosures</div></div>\
        <div class="text-center"><div class="text-lg font-semibold text-green-400">' + highPriority + '</div><div class="text-xs text-dark-400">High Priority</div></div>\
        <div class="text-center"><div class="text-lg font-semibold text-blue-400">' + trackedCount + '</div><div class="text-xs text-dark-400">Tracked</div></div>\
        <div class="text-center"><div class="text-lg font-semibold text-amber-400">$' + formatNum(totalBalance) + '</div><div class="text-xs text-dark-400">Total Balance</div></div>\
        <div class="text-center"><div class="text-lg font-semibold text-red-400">$' + formatNum(totalArrears) + '</div><div class="text-xs text-dark-400">Total Arrears</div></div>';
}

// ========================
// FILTERS & SORT
// ========================
function applyFilters() {
    const search = document.getElementById('search').value.toLowerCase();
    const statusFilter = document.getElementById('filter-status').value;
    const foreclosureFilter = document.getElementById('filter-foreclosure').value;
    const loanFilter = document.getElementById('filter-loan').value;
    const countyFilter = document.getElementById('filter-county').value;
    const trackedFilter = document.getElementById('filter-tracked').value;
    const ownerTypeFilter = document.getElementById('filter-owner-type').value;
    const defStatusFilter = document.getElementById('filter-def-status').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = allCases.filter(c => {
        const cid = String(c.id);
        const parties = allParties[cid] || [];
        const prop = allProperties[cid];
        const defInfo = getDefendantInfo(c.id);

        if (statusFilter && c.status?.toLowerCase() !== statusFilter.toLowerCase()) return false;
        if (foreclosureFilter !== '' && c.is_foreclosure !== parseInt(foreclosureFilter)) return false;
        const hasLoan = !!allLoans[cid];
        if (loanFilter === 'has' && !hasLoan) return false;
        if (loanFilter === 'no' && hasLoan) return false;
        if (countyFilter && c.county !== countyFilter) return false;
        if (trackedFilter === 'yes' && !c.tracked) return false;
        if (trackedFilter === 'no' && c.tracked) return false;

        // Owner type filter
        if (ownerTypeFilter) {
            const hasType = defInfo.defendants.some(d => d.owner_type === ownerTypeFilter);
            if (!hasType) return false;
        }

        // Defendant status filter
        if (defStatusFilter === 'silent' && defInfo.hasAttorney) return false;
        if (defStatusFilter === 'defended' && !defInfo.hasAttorney) return false;

        if (search) {
            const searchFields = [
                c.case_id, c.note, c.status,
                ...parties.map(p => p.name), ...parties.map(p => p.firm),
                prop?.address, prop?.city, prop?.zip_code
            ].filter(Boolean).join(' ').toLowerCase();
            if (!searchFields.includes(search)) return false;
        }
        return true;
    });

    // Sort
    filtered.sort((a, b) => {
        if (sortBy === 'priority') {
            const pa = getCasePriority(a).score;
            const pb = getCasePriority(b).score;
            if (pa !== pb) return pa - pb;
            return a.seq_num - b.seq_num;
        }
        if (sortBy === 'seq_num') return a.seq_num - b.seq_num;
        if (sortBy === 'filed_date') return (a.filed_date || '').localeCompare(b.filed_date || '');
        if (sortBy === 'principal_balance') {
            return (allLoans[String(b.id)]?.principal_balance || 0) - (allLoans[String(a.id)]?.principal_balance || 0);
        }
        if (sortBy === 'estimated_arrears') {
            return (allLoans[String(b.id)]?.estimated_arrears || 0) - (allLoans[String(a.id)]?.estimated_arrears || 0);
        }
        return 0;
    });

    renderTable(filtered);
}

function clearFilters() {
    document.getElementById('search').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-foreclosure').value = '';
    document.getElementById('filter-loan').value = '';
    document.getElementById('filter-county').value = '';
    document.getElementById('filter-tracked').value = '';
    document.getElementById('filter-owner-type').value = '';
    document.getElementById('filter-def-status').value = '';
    document.getElementById('sort-by').value = 'priority';
    applyFilters();
}

// ========================
// RENDER TABLE
// ========================
function renderTable(cases) {
    document.getElementById('loading').classList.add('hidden');
    if (cases.length === 0) {
        document.getElementById('empty').classList.remove('hidden');
        document.getElementById('table-container').classList.add('hidden');
        return;
    }
    document.getElementById('empty').classList.add('hidden');
    document.getElementById('table-container').classList.remove('hidden');

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = cases.map(c => {
        const cid = String(c.id);
        const loan = allLoans[cid];
        const prop = allProperties[cid];
        const defInfo = getDefendantInfo(c.id);
        const priority = getCasePriority(c);
        const defStatus = getDefendantStatusLabel(c.id);

        const statusClass = c.status?.toLowerCase().includes('open') ? 'status-open'
            : c.status?.toLowerCase() === 'active' ? 'status-active' : 'status-closed';

        // Main defendant name
        const mainDef = defInfo.defendants[0];
        const defName = mainDef ? mainDef.name : '—';
        const defCount = defInfo.defendants.length;
        const defExtra = defCount > 1 ? ' <span class="text-dark-500 text-xs">+' + (defCount - 1) + '</span>' : '';

        // Owner type badges
        const ownerTypes = defInfo.ownerTypes;
        const ownerBadges = ownerTypes.map(t => {
            const lbl = getOwnerTypeLabel(t);
            return '<span class="px-1.5 py-0.5 rounded text-[10px] font-medium ' + lbl.class + '">' + lbl.text + '</span>';
        }).join(' ') || '<span class="text-dark-600 text-xs">—</span>';

        return '\
        <tr class="border-b border-dark-800/50 row-hover transition-colors cursor-pointer" onclick="showDetail(' + c.id + ')">\
            <td class="px-3 py-3 text-center" onclick="event.stopPropagation()"><input type="checkbox" ' + (c.tracked ? 'checked' : '') + ' onchange="toggleTracked(' + c.id + ', this.checked)" class="w-4 h-4 rounded border-dark-600 bg-dark-800 text-blue-500 focus:ring-blue-500/20 focus:ring-2 cursor-pointer accent-blue-500"></td>\
            <td class="px-3 py-3 text-center"><span class="px-2 py-1 rounded-lg text-[10px] font-semibold priority-' + priority.level + '">' + priority.label + '</span></td>\
            <td class="px-4 py-3"><div class="font-medium text-white text-xs font-mono">' + (c.case_id || '—') + '</div>' + (c.is_foreclosure ? '<span class="inline-block mt-1 px-1.5 py-0.5 text-[10px] font-medium rounded bg-amber-500/10 text-amber-400">FORECLOSURE</span>' : '') + '</td>\
            <td class="px-4 py-3 text-dark-300">' + (c.filed_date || '—') + '</td>\
            <td class="px-4 py-3"><span class="px-2 py-1 rounded-lg text-xs font-medium ' + statusClass + '">' + (c.status || '—') + '</span></td>\
            <td class="px-4 py-3 text-dark-200 max-w-[180px]"><div class="truncate font-medium">' + defName + defExtra + '</div></td>\
            <td class="px-4 py-3">' + ownerBadges + '</td>\
            <td class="px-4 py-3"><span class="px-2 py-0.5 rounded text-xs font-medium ' + defStatus.class + '">' + defStatus.text + '</span></td>\
            <td class="px-4 py-3 text-dark-300 max-w-[200px] truncate">' + (prop ? [prop.address, prop.city].filter(Boolean).join(', ') : '—') + '</td>\
            <td class="px-4 py-3 text-right font-mono ' + (loan?.principal_balance ? 'text-amber-300' : 'text-dark-500') + '">' + (loan?.principal_balance ? '$' + formatNum(loan.principal_balance) : '—') + '</td>\
            <td class="px-4 py-3 text-right font-mono ' + (loan?.estimated_arrears ? 'text-red-400' : 'text-dark-500') + '">' + (loan?.estimated_arrears ? '$' + formatNum(loan.estimated_arrears) : '—') + '</td>\
            <td class="px-4 py-3 text-center"><button class="p-1.5 rounded-lg hover:bg-dark-700 transition-colors text-dark-400 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button></td>\
        </tr>';
    }).join('');
}

        html += loanField('Monthly Payment', loan.monthly_payment ? '$' + formatNum(loan.monthly_payment) : '—');
        html += loanField('Principal Balance', loan.principal_balance ? '$' + formatNum(loan.principal_balance) : '—', 'text-amber-300');

    }

    // === PLAINTIFFS ===
    if (plaintiffs.length > 0 || pAttorneys.length > 0) {
        html += '<h3 class="text-sm font-semibold text-dark-300 uppercase tracking-wider mb-3">Plaintiff</h3>';

            html += '<div class="py-1"><span class="text-white">' + (p.name || '—') + '</span>';

            html += '</div>';
        });

                html += '</div>';
            });
            html += '</div>';
        }
        html += '</div>';
    }

    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

// ========================
// TRACKED TOGGLE
// ========================
async function toggleTracked(caseId, tracked) {
    if (!sbClient) return;
    const { error } = await sbClient.from('cases').update({ tracked }).eq('id', caseId);
    if (error) { console.error('Toggle error:', error); alert('Failed to update: ' + error.message); return; }
    const c = allCases.find(x => x.id === caseId);
    if (c) c.tracked = tracked;
    updateStats();
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.body.style.overflow = '';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === '/' && !e.ctrlKey) { e.preventDefault(); document.getElementById('search').focus(); }
});

// RESIZABLE COLUMNS
// ===================
function initResizableColumns() {
    const table = document.getElementById('cases-table');
    if (!table) return;
    const cols = table.querySelectorAll('colgroup col');
    const handles = table.querySelectorAll('.col-resize-handle');

    handles.forEach(handle => {
        handle.addEventListener('mousedown', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const th = handle.parentElement;
            const thIndex = Array.from(th.parentElement.children).indexOf(th);
            const col = cols[thIndex];
            const startX = e.pageX;
            const startWidth = col.offsetWidth || parseInt(col.style.width);

            handle.classList.add('active');
            document.body.classList.add('col-resizing');

            function onMouseMove(ev) {
                const diff = ev.pageX - startX;
                const newWidth = Math.max(40, startWidth + diff);
                col.style.width = newWidth + 'px';
            }

            function onMouseUp() {
                handle.classList.remove('active');
                document.body.classList.remove('col-resizing');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
    });
}

// ===================
// INIT
// ===================
document.addEventListener('DOMContentLoaded', () => { loadData(); initResizableColumns(); });
</script>
